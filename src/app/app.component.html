<igo-spinner igoSpinnerActivity />

@if (authConfig && authConfig.url) {
  <igo-auth-form />
}

@if (hasHeader) {
  <app-header #header />
}

<app-portal
  [ngClass]="
    hasHeader
      ? hasFooter
        ? 'portal-with-header-footer'
        : 'portal-with-header'
      : hasFooter
        ? 'portal-with-footer'
        : 'portal'
  "
  igoStopDropPropagation
/>

@if (hasFooter) {
  <app-footer />
}
