<igo-spinner igoSpinnerActivity></igo-spinner>

@if (authConfig && authConfig.url) {
  <igo-auth-form></igo-auth-form>
}

@if (hasHeader) {
  <app-header #header></app-header>
}

<app-portal
  [ngClass]="
    hasHeader
      ? hasFooter
        ? 'portal-with-header-footer'
        : 'portal-with-header'
      : hasFooter
        ? 'portal-with-footer'
        : 'portal'
  "
  igoStopDropPropagation
></app-portal>

@if (hasFooter) {
  <app-footer></app-footer>
}
