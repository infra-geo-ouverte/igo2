    <style id="splash-screen-stylesheet">
      #splash-screen {
        align-items: center;
        background-color: #f5f7f9;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        left: 0;
        opacity: 1;
        position: absolute;
        right: 0;
        top: 0;
        transform: translateZ(0);
        z-index: 1999;
        transition: all 300ms;
      }

      #splash-screen.is-destroying {
        opacity: 0;
      }

      #splash-screen__filmstrip {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 24px;
      }

      #splash-screen__filmstrip img {
        width: auto;
        height: 95px;
      }

      #splash-screen__spinner {
        margin-top: 0;
        opacity: 0;
      }

      #splash-screen.is-loaded #splash-screen__spinner {
        animation:
          spinner-fade 0.2s ease 0.8s,
          spinner-rotate 1s linear infinite;
        animation-fill-mode: forwards;
      }

      @keyframes spinner-fade {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes spinner-rotate {
        from {
          transform: translateZ(0) rotate(0deg);
        }

        to {
          transform: translateZ(0) rotate(360deg);
        }
      }
    </style>
